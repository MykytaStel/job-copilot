pre-commit:
  parallel: true
  commands:
    cargo-fmt:
      glob: "apps/{engine-api,ingestion}/**/*.rs"
      run: cargo fmt --all -- --check

    web-eslint:
      glob: "apps/web/**/*.{ts,tsx}"
      run: pnpm --dir apps/web eslint .

    python-ruff:
      glob: "apps/ml/**/*.py"
      run: cd apps/ml && ruff check .

pre-push:
  parallel: true
  commands:
    cargo-clippy:
      run: cargo clippy --workspace --all-targets -- -D warnings

    cargo-test:
      run: cargo test --workspace
