[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "W"]
ignore = [
    "E501",
    "UP040",  # TypeAlias → type keyword (Python 3.12 syntax, optional)
    "UP047",  # TypeVar via type params (Python 3.12 syntax, optional)
]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = true
warn_return_any = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
