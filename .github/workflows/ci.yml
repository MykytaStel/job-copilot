name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  web-and-workspace:
    name: Web + workspace checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prevent internal api barrel imports
        run: pnpm guard:web-api-imports

      - name: Prevent scattered profile scope storage access
        run: pnpm guard:web-profile-scope

      - name: Report runtime boundary issues
        run: pnpm guard:runtime-boundaries:report

      - name: Report runtime file budgets
        run: pnpm guard:file-size-budgets:report

      - name: Workspace typecheck
        run: pnpm typecheck

      - name: Web typecheck
        run: pnpm --dir apps/web run typecheck

      - name: Web eslint
        run: pnpm --dir apps/web run eslint

      - name: Workspace build
        run: pnpm build

      - name: Web tests
        run: pnpm --dir apps/web test -- --run

  engine-api:
    name: Rust engine-api checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/engine-api
            apps/ingestion

      - name: Cargo fmt
        run: cargo fmt --manifest-path apps/engine-api/Cargo.toml --all -- --check

      - name: Cargo check engine-api
        run: cargo check --manifest-path apps/engine-api/Cargo.toml

      - name: Cargo check ingestion
        run: cargo check --manifest-path apps/ingestion/Cargo.toml

      - name: Cargo test engine-api
        run: cargo test --manifest-path apps/engine-api/Cargo.toml

      - name: Cargo test ingestion
        run: cargo test --manifest-path apps/ingestion/Cargo.toml

  ml-sidecar:
    name: ML sidecar checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/ml/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r apps/ml/requirements-dev.txt

      - name: Run ML tests
        run: pytest apps/ml/tests/ -v --tb=short
