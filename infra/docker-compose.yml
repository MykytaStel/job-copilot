services:

  # ── Postgres ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: job-copilot-postgres
    # Flags that must be set at server start (cannot be changed at runtime):
    #   shared_preload_libraries  — enables pg_stat_statements query tracking
    #   log_min_duration_statement — logs any query slower than 200 ms to stdout
    #   log_lock_waits            — logs whenever a lock wait exceeds deadlock_timeout
    command: >
      postgres -c shared_preload_libraries=pg_stat_statements -c
      log_min_duration_statement=200 -c log_lock_waits=on -c log_line_prefix='%t
      [%p] %u@%d '
    environment:
      POSTGRES_USER: jobcopilot
      POSTGRES_PASSWORD: jobcopilot
      POSTGRES_DB: jobcopilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U jobcopilot -d jobcopilot" ]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 2s

  # ── Engine API (Rust/Axum) ──────────────────────────────────────────────────
  engine-api:
    build:
      context: ..
      dockerfile: apps/engine-api/Dockerfile
    container_name: job-copilot-engine-api
    environment:
      APP_ENV: "${APP_ENV:-development}"
      LOG_FORMAT: json

      DATABASE_URL: postgres://jobcopilot:jobcopilot@postgres:5432/jobcopilot
      DATABASE_MAX_CONNECTIONS: "${DATABASE_MAX_CONNECTIONS:-20}"
      RUN_DB_MIGRATIONS: "${RUN_DB_MIGRATIONS:-true}"

      PORT: "${PORT:-8080}"

      JWT_SECRET: "${JWT_SECRET:-local-dev-secret-change-me}"

      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127\
        .0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}"

      ML_SIDECAR_BASE_URL: "${ML_SIDECAR_BASE_URL:-http://ml:8000}"
      ML_SIDECAR_TIMEOUT_SECONDS: "${ML_SIDECAR_TIMEOUT_SECONDS:-90}"

      RERANKER_RUNTIME_MODE: "${RERANKER_RUNTIME_MODE:-deterministic}"
      LEARNED_RERANKER_ENABLED: "${LEARNED_RERANKER_ENABLED:-true}"
      TRAINED_RERANKER_ENABLED: "${TRAINED_RERANKER_ENABLED:-false}"
      TRAINED_RERANKER_MODEL_PATH: "${TRAINED_RERANKER_MODEL_PATH:-/app/models/trained-reranker-v2.json}"

      METRICS_PORT: "${METRICS_PORT:-9090}"
    volumes:
      - ../apps/ml/models:/app/models:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/ready" ]
      interval: 5s
      timeout: 1s
      retries: 12
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  # ── Web (React/Vite → nginx) ────────────────────────────────────────────────
  # VITE_* args are baked into the bundle at build time and must be browser-
  # reachable paths. With the nginx gateway in place these are relative paths
  # on the same origin, so no CORS applies in Docker.
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_ENGINE_API_URL: /api
        VITE_ML_URL: /ml
    container_name: job-copilot-web
    depends_on:
      engine-api:
        condition: service_healthy

  # ── nginx API gateway ────────────────────────────────────────────────────────
  # Single origin for the browser: /api/* → engine-api, /ml/* → ml, / → web.
  # Access the full stack at http://localhost:3000
  nginx:
    image: nginx:alpine
    container_name: job-copilot-nginx
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - engine-api
      - ml

  # ── Scraper daemon ──────────────────────────────────────────────────────────
  # Scrapes Djinni + Work.ua every 60 minutes and upserts results into Postgres.
  # Set SCRAPE_INTERVAL_MINUTES to override the default.
  # Set SCRAPE_PAGES to control how many pages per source (default 3).
  scraper:
    build:
      context: ..
      dockerfile: apps/ingestion/Dockerfile
    container_name: job-copilot-scraper
    environment:
      DATABASE_URL: postgres://jobcopilot:jobcopilot@postgres:5432/jobcopilot
    command:
      - "--daemon"
      - "--sources"
      - "all"
      - "--pages"
      - "${SCRAPE_PAGES:-3}"
      - "--interval-minutes"
      - "${SCRAPE_INTERVAL_MINUTES:-60}"
    depends_on:
      postgres:
        condition: service_healthy
      engine-api:
        condition: service_healthy
    restart: unless-stopped

  # ── ML sidecar (Python/FastAPI) ─────────────────────────────────────────────
  ml:
    build:
      context: ../apps/ml
      dockerfile: Dockerfile
    container_name: job-copilot-ml
    environment:
      ENGINE_API_BASE_URL: http://engine-api:8080
      PORT: "8000"
      LOG_FORMAT: json
      # change to 'ollama' if Ollama is running locally
      ML_LLM_PROVIDER: "${ML_LLM_PROVIDER:-template}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      ML_LLM_REQUEST_TIMEOUT_SECONDS: "${ML_LLM_REQUEST_TIMEOUT_SECONDS:-90}"
      ML_BOOTSTRAP_MAX_CONCURRENT_JOBS: "${ML_BOOTSTRAP_MAX_CONCURRENT_JOBS:-2}"
      ML_ARTIFACTS_DIR: /app/models/profiles
      ML_BOOTSTRAP_TASKS_DIR: /app/.runtime/bootstrap-tasks
      ML_INTERNAL_TOKEN: "${ML_INTERNAL_TOKEN:-}"
      ENGINE_API_INTERNAL_TOKEN: "${ENGINE_API_INTERNAL_TOKEN:-}"
      # host.docker.internal resolves to the host machine where Ollama Desktop runs
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.1:8b}"
    volumes:
      - ../apps/ml/models:/app/models
      - ml-runtime:/app/.runtime
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/ready" ]
      interval: 5s
      timeout: 1s
      retries: 12
      start_period: 15s
    depends_on:
      engine-api:
        condition: service_healthy

  # ── Prometheus ──────────────────────────────────────────────────────────────
  # Scrapes engine-api:8080/metrics and ml:8000/metrics every 15 s.
  # UI: http://localhost:9090
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: job-copilot-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - engine-api

  # ── Grafana ─────────────────────────────────────────────────────────────────
  # Pre-provisioned with Prometheus datasource and engine-api dashboard.
  # UI: http://localhost:3001  login: admin / admin
  grafana:
    image: grafana/grafana:10.3.3
    container_name: job-copilot-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  ml-runtime:
